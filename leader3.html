<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>المرشدات</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="icon" type="image/png" href="LOGO KASHEF.png">

  <style>
    @font-face {
      font-family: "Noor";
      src: url("Noor Regular.ttf") format("truetype");
      font-display: swap;
    }

    :root {
      --primary: #480081;
      --primary-2: #7b1fd1;
      --bg: #E6E6F9;
      --text: #241036;
      --muted: #766c89;
      --border: #ded6f2;
      --danger: #dc2626;
      --danger-dark: #b91c1c;
      --success: #198754;
      --success-dark: #157347;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noor", Tahoma, Arial, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(72,0,129,.16), transparent 30%),
        linear-gradient(135deg, #faf8ff, var(--bg));
      color: var(--text);
      padding: 24px;
    }

    .page {
      max-width: 1180px;
      margin: auto;
    }

    .header-card {
      background: rgba(255,255,255,.92);
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 20px 55px rgba(72,0,129,.13);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 26px;
    }

    h1 {
      color: var(--primary);
      font-weight: 900;
      margin: 0 0 6px;
      font-size: 30px;
    }

    .subtitle {
      color: var(--muted);
      margin: 0;
    }

    .btn-main {
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: white;
      border: none;
      border-radius: 16px;
      padding: 13px 24px;
      font-weight: 900;
      box-shadow: 0 14px 30px rgba(72,0,129,.25);
    }

    .btn-export {
      background: var(--success);
      color: white;
      border: none;
      border-radius: 16px;
      padding: 13px 24px;
      font-weight: 900;
      box-shadow: 0 14px 30px rgba(25,135,84,.22);
    }

    .btn-logout {
      background: #fff0f0;
      color: var(--danger);
      border: 1px solid #ffcaca;
      border-radius: 16px;
      padding: 13px 24px;
      font-weight: 900;
    }

    .status-message {
      display: none;
      margin-bottom: 20px;
      padding: 14px 16px;
      border-radius: 15px;
      font-weight: 800;
      line-height: 1.7;
    }

    .status-message.error { display:block; color:#a61b1b; background:#fff0f0; border:1px solid #ffc4c4; }
    .status-message.success { display:block; color:#146c43; background:#ecfff4; border:1px solid #a8e5c2; }

    .account-info { margin-top:5px; color:var(--primary); font-size:13px; font-weight:800; }

    .loading-overlay { position:fixed; inset:0; z-index:3000; display:grid; place-items:center; padding:20px; background:rgba(246,243,253,.94); }
    .loading-card { width:100%; max-width:350px; padding:28px; text-align:center; background:#fff; border-radius:24px; box-shadow:0 24px 70px rgba(72,0,129,.20); }
    .spinner-border { color:var(--primary); }

    .btn-delete {
      height: 52px;
      border: none;
      border-radius: 16px;
      background: var(--danger);
      color: white;
      font-weight: 900;
      display: none;
    }

    .btn-delete:hover {
      background: var(--danger-dark);
      color: white;
    }

    .empty-box {
      background: white;
      border-radius: 28px;
      padding: 70px 25px;
      text-align: center;
      box-shadow: 0 18px 45px rgba(72,0,129,.10);
    }

    .empty-box h2 {
      color: var(--primary);
      font-weight: 900;
    }

    .members-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 22px;
    }

    .member-card {
      background: white;
      border-radius: 26px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 16px 38px rgba(72,0,129,.11);
      transition: .25s ease;
    }

    .member-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 22px 50px rgba(72,0,129,.18);
    }

    .member-photo {
      width: 115px;
      height: 115px;
      border-radius: 24px;
      object-fit: cover;
      background: #f1eef8;
      margin-bottom: 16px;
    }

    .member-name {
      color: var(--primary);
      font-size: 21px;
      font-weight: 900;
      margin-bottom: 18px;
      line-height: 1.5;
    }

    .member-actions {
      display: flex;
      gap: 10px;
    }

    .member-actions button {
      flex: 1;
      height: 44px;
      border: none;
      border-radius: 13px;
      font-family: inherit;
      font-weight: 800;
    }

    .btn-show {
      background: #f3eefb;
      color: var(--primary);
    }

    .btn-edit {
      background: var(--primary);
      color: white;
    }

    .modal-content {
      border: none;
      border-radius: 26px;
      overflow: hidden;
    }

    .modal-header {
      background: #f7f2ff;
      border-bottom: 1px solid var(--border);
    }

    .modal-title {
      color: var(--primary);
      font-weight: 900;
    }

    label {
      color: var(--primary);
      font-weight: 800;
      margin-bottom: 7px;
    }

    .form-control,
    .form-select {
      height: 52px;
      border-radius: 15px;
      border-color: var(--border);
      box-shadow: none;
    }

    textarea.form-control {
      height: 95px;
    }

    .preview-img {
      width: 120px;
      height: 120px;
      border-radius: 22px;
      object-fit: cover;
      background: #f1eef8;
      display: none;
      margin-top: 12px;
    }

    .detail-photo {
      width: 130px;
      height: 130px;
      border-radius: 24px;
      object-fit: cover;
      background: #f1eef8;
      display: block;
      margin: 0 auto 18px;
    }

    .detail-row {
      padding: 10px 0;
      border-bottom: 1px solid #eee8f8;
      color: var(--muted);
    }

    .detail-row strong {
      color: var(--primary);
    }

    @media (max-width: 700px) {
      body { padding: 16px; }

      .header-card {
        flex-direction: column;
        text-align: center;
        padding: 24px 18px;
      }

      h1 { font-size: 24px; }

      .member-actions {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <div id="loadingOverlay" class="loading-overlay"><div class="loading-card"><div class="spinner-border" role="status"></div><p id="loadingText" class="mt-3 mb-0">جاري التحقق من الحساب...</p></div></div>

  <main class="page">

    <section class="header-card">
      <div>
        <h1>صفحة المرشدات</h1>
        <p class="subtitle">إدارة بيانات فرقة الامل</p>
        <p id="accountInfo" class="account-info"></p>
      </div>

      <div class="d-flex gap-2 flex-wrap">
        <button type="button" id="addMemberButton" class="btn btn-main">+ إضافة عضو</button>
        <button type="button" id="exportButton" class="btn btn-export">تصدير Excel</button>
        <button type="button" id="logoutButton" class="btn btn-logout">تسجيل الخروج</button>
      </div>
    </section>

    <div id="statusMessage" class="status-message" role="alert"></div>

    <section id="emptyBox" class="empty-box">
      <h2>لا يوجد بيانات حالياً</h2>
      <p class="text-muted">الرجاء إضافة البيانات .</p>
      <button type="button" id="emptyAddButton" class="btn btn-main mt-3">إضافة أول عضو</button>
    </section>

    <section id="membersList" class="members-grid"></section>

  </main>

  <div class="modal fade" id="memberModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 id="modalTitle" class="modal-title">إضافة عضو جديد</h5>
          <button type="button" class="btn-close ms-0" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <form id="memberForm">
            <input type="hidden" id="editIndex">

            <div class="row g-3">
              <div class="col-12">
                <label>صورة العضو</label>
                <input type="file" id="photo" class="form-control" accept="image/*">
                <img id="photoPreview" class="preview-img">
              </div>

              <div class="col-md-4">
                <label>الاسم</label>
                <input type="text" id="firstName" class="form-control" required>
              </div>

              <div class="col-md-4">
                <label>اسم الأب</label>
                <input type="text" id="fatherName" class="form-control" required>
              </div>

              <div class="col-md-4">
                <label>الشهرة</label>
                <input type="text" id="familyName" class="form-control" required>
              </div>

              <div class="col-md-6">
                <label>اسم الأم</label>
                <input type="text" id="motherName" class="form-control">
              </div>

              <div class="col-md-6">
                <label>شهرة الأم</label>
                <input type="text" id="motherFamilyName" class="form-control">
              </div>

              <div class="col-md-4">
                <label>تاريخ الولادة</label>
                <input type="date" id="birthDate" class="form-control">
              </div>

              <div class="col-md-4">
                <label>محل الولادة</label>
                <input type="text" id="birthPlace" class="form-control">
              </div>

              <div class="col-md-4">
                <label>رقم السجل</label>
                <input type="text" id="recordNumber" class="form-control">
              </div>

              <div class="col-md-6">
                <label>فئة الدم</label>
                <select id="bloodType" class="form-select">
                  <option value="">اختر فئة الدم</option>
                  <option>A+</option>
                  <option>A-</option>
                  <option>B+</option>
                  <option>B-</option>
                  <option>AB+</option>
                  <option>AB-</option>
                  <option>O+</option>
                  <option>O-</option>
                </select>
              </div>

              <div class="col-md-6">
                <label>رقم الهاتف</label>
                <input type="tel" id="phone" class="form-control">
              </div>

              <div class="col-md-6">
                <label>رقم ولي الأمر</label>
                <input type="tel" id="parentPhone" class="form-control">
              </div>

              <div class="col-md-6">
                <label>البريد الإلكتروني</label>
                <input type="email" id="email" class="form-control">
              </div>

              <div class="col-md-6">
                <label>عدد أفراد الأسرة</label>
                <input type="number" id="familyMembers" class="form-control" min="1" placeholder="مثال: 5">
              </div>

              <div class="col-md-6">
                <label>العنوان</label>
                <input type="text" id="address" class="form-control">
              </div>

              <div class="col-12">
                <label>ملاحظات صحية / حساسية</label>
                <textarea id="healthNotes" class="form-control"></textarea>
              </div>
            </div>

            <button type="submit" class="btn btn-main w-100 mt-4">حفظ البيانات</button>

            <button type="button" id="deleteBtn" class="btn btn-delete w-100 mt-3" onclick="deleteMember()">
              حذف العضو
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="detailsModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">تفاصيل العضو</h5>
          <button type="button" class="btn-close ms-0" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body" id="detailsBody"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = "https://hubdemnxzldlilyyjoyh.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_lOM6aOp6NU7nHozpTpsTSA_HfBb-Xqq";
    const REQUIRED_LEADER = "leader3";
    const LOGIN_PAGE = "./index.html";
    const DEFAULT_PHOTO = "./LOGO KASHEF.png";

    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
    });

    let currentUser = null;
    let currentProfile = null;
    let members = [];
    let photoData = "";

    const loadingOverlay = document.getElementById("loadingOverlay");
    const loadingText = document.getElementById("loadingText");
    const accountInfo = document.getElementById("accountInfo");
    const statusMessage = document.getElementById("statusMessage");
    const membersList = document.getElementById("membersList");
    const emptyBox = document.getElementById("emptyBox");
    const form = document.getElementById("memberForm");
    const deleteBtn = document.getElementById("deleteBtn");
    const addMemberButton = document.getElementById("addMemberButton");
    const emptyAddButton = document.getElementById("emptyAddButton");
    const exportButton = document.getElementById("exportButton");
    const logoutButton = document.getElementById("logoutButton");

    const memberModal = new bootstrap.Modal(document.getElementById("memberModal"));
    const detailsModal = new bootstrap.Modal(document.getElementById("detailsModal"));

    function setLoading(show, message = "جاري التحميل...") {
      loadingText.textContent = message;
      loadingOverlay.style.display = show ? "grid" : "none";
    }

    function showStatus(message, type = "error") {
      statusMessage.textContent = message;
      statusMessage.className = "status-message " + type;
    }

    function clearStatus() {
      statusMessage.textContent = "";
      statusMessage.className = "status-message";
    }

    function esc(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function initializePage() {
      try {
        setLoading(true, "جاري التحقق من الحساب...");

        const { data: { session }, error: sessionError } = await db.auth.getSession();
        if (sessionError) throw sessionError;

        if (!session?.user) {
          window.location.replace(LOGIN_PAGE);
          return;
        }

        currentUser = session.user;

        const { data: profile, error: profileError } = await db
          .from("profiles")
          .select("id, leader_username, role")
          .eq("id", currentUser.id)
          .single();

        if (profileError) throw new Error("تعذر تحميل ملف الحساب: " + profileError.message);

        if (profile.role !== "leader" || profile.leader_username !== REQUIRED_LEADER) {
          await db.auth.signOut();
          window.location.replace(LOGIN_PAGE);
          return;
        }

        currentProfile = profile;
        accountInfo.textContent = "الحساب: " + profile.leader_username + " — " + (currentUser.email || "");
        await loadMembers();
      } catch (error) {
        console.error(error);
        showStatus(error.message || "حدث خطأ أثناء فتح الصفحة.");
      } finally {
        setLoading(false);
      }
    }

    async function loadMembers() {
      clearStatus();
      const { data, error } = await db
        .from("members")
        .select("*")
        .eq("owner_id", currentUser.id)
        .order("id", { ascending: false });

      if (error) {
        showStatus("خطأ في تحميل البيانات: " + error.message);
        return;
      }

      members = data || [];
      renderMembers();
    }

    function openAddModal() {
      form.reset();
      photoData = "";
      document.getElementById("editIndex").value = "";
      document.getElementById("modalTitle").innerText = "إضافة عضو جديد";
      document.getElementById("photoPreview").style.display = "none";
      deleteBtn.style.display = "none";
      memberModal.show();
    }

    function editMember(index) {
      const m = members[index];
      document.getElementById("editIndex").value = index;
      document.getElementById("modalTitle").innerText = "تعديل بيانات العضو";
      deleteBtn.style.display = "block";

      document.getElementById("firstName").value = m.first_name || "";
      document.getElementById("fatherName").value = m.father_name || "";
      document.getElementById("familyName").value = m.family_name || "";
      document.getElementById("motherName").value = m.mother_name || "";
      document.getElementById("motherFamilyName").value = m.mother_family_name || "";
      document.getElementById("birthDate").value = m.birth_date || "";
      document.getElementById("birthPlace").value = m.birth_place || "";
      document.getElementById("recordNumber").value = m.record_number || "";
      document.getElementById("bloodType").value = m.blood_type || "";
      document.getElementById("phone").value = m.phone || "";
      document.getElementById("parentPhone").value = m.parent_phone || "";
      document.getElementById("email").value = m.email || "";
      document.getElementById("familyMembers").value = m.family_members || "";
      document.getElementById("address").value = m.address || "";
      document.getElementById("healthNotes").value = m.health_notes || "";

      photoData = m.photo || "";
      const preview = document.getElementById("photoPreview");
      if (photoData) {
        preview.src = photoData;
        preview.style.display = "block";
      } else {
        preview.style.display = "none";
      }

      memberModal.show();
    }

    async function deleteMember() {
      const editIndex = document.getElementById("editIndex").value;
      if (editIndex === "") return;
      const member = members[editIndex];
      if (!confirm("هل أنت متأكد أنك تريد حذف هذا العضو؟")) return;

      const { error } = await db
        .from("members")
        .delete()
        .eq("id", member.id)
        .eq("owner_id", currentUser.id);

      if (error) {
        showStatus("خطأ في الحذف: " + error.message);
        return;
      }

      memberModal.hide();
      showStatus("تم حذف العضو بنجاح.", "success");
      await loadMembers();
    }

    document.getElementById("photo").addEventListener("change", function () {
      const file = this.files[0];
      if (!file) return;

      if (file.size > 2 * 1024 * 1024) {
        showStatus("حجم الصورة كبير. الحد الأقصى 2MB.");
        this.value = "";
        return;
      }

      const reader = new FileReader();
      reader.onload = function (event) {
        photoData = event.target.result;
        const preview = document.getElementById("photoPreview");
        preview.src = photoData;
        preview.style.display = "block";
      };
      reader.readAsDataURL(file);
    });

    form.addEventListener("submit", async function (event) {
      event.preventDefault();

      const memberData = {
        owner_id: currentUser.id,
        leader_username: currentProfile.leader_username,
        photo: photoData || null,
        first_name: document.getElementById("firstName").value.trim(),
        father_name: document.getElementById("fatherName").value.trim(),
        family_name: document.getElementById("familyName").value.trim(),
        mother_name: document.getElementById("motherName").value.trim(),
        mother_family_name: document.getElementById("motherFamilyName").value.trim(),
        birth_date: document.getElementById("birthDate").value || null,
        birth_place: document.getElementById("birthPlace").value.trim(),
        record_number: document.getElementById("recordNumber").value.trim(),
        blood_type: document.getElementById("bloodType").value,
        phone: document.getElementById("phone").value.trim(),
        parent_phone: document.getElementById("parentPhone").value.trim(),
        email: document.getElementById("email").value.trim(),
        family_members: document.getElementById("familyMembers").value ? Number(document.getElementById("familyMembers").value) : null,
        address: document.getElementById("address").value.trim(),
        health_notes: document.getElementById("healthNotes").value.trim()
      };

      const editIndex = document.getElementById("editIndex").value;
      let response;

      if (editIndex === "") {
        response = await db.from("members").insert(memberData);
      } else {
        response = await db
          .from("members")
          .update(memberData)
          .eq("id", members[editIndex].id)
          .eq("owner_id", currentUser.id);
      }

      if (response.error) {
        showStatus("خطأ في حفظ البيانات: " + response.error.message);
        return;
      }

      memberModal.hide();
      showStatus(editIndex === "" ? "تمت إضافة العضو بنجاح." : "تم تعديل العضو بنجاح.", "success");
      await loadMembers();
    });

    function showMember(index) {
      const m = members[index];
      document.getElementById("detailsBody").innerHTML = `
        <img src="${esc(m.photo || DEFAULT_PHOTO)}" class="detail-photo">
        <div class="detail-row"><strong>الاسم الكامل:</strong> ${esc(m.first_name || "")} ${esc(m.father_name || "")} ${esc(m.family_name || "")}</div>
        <div class="detail-row"><strong>اسم الأم:</strong> ${esc(m.mother_name || "-")} ${esc(m.mother_family_name || "")}</div>
        <div class="detail-row"><strong>تاريخ الولادة:</strong> ${esc(m.birth_date || "-")}</div>
        <div class="detail-row"><strong>محل الولادة:</strong> ${esc(m.birth_place || "-")}</div>
        <div class="detail-row"><strong>رقم السجل:</strong> ${esc(m.record_number || "-")}</div>
        <div class="detail-row"><strong>فئة الدم:</strong> ${esc(m.blood_type || "-")}</div>
        <div class="detail-row"><strong>رقم الهاتف:</strong> ${esc(m.phone || "-")}</div>
        <div class="detail-row"><strong>رقم ولي الأمر:</strong> ${esc(m.parent_phone || "-")}</div>
        <div class="detail-row"><strong>البريد الإلكتروني:</strong> ${esc(m.email || "-")}</div>
        <div class="detail-row"><strong>عدد أفراد الأسرة:</strong> ${esc(m.family_members || "-")}</div>
        <div class="detail-row"><strong>العنوان:</strong> ${esc(m.address || "-")}</div>
        <div class="detail-row"><strong>ملاحظات صحية:</strong> ${esc(m.health_notes || "-")}</div>
      `;
      detailsModal.show();
    }

    function exportToExcel() {
      if (members.length === 0) {
        showStatus("لا توجد بيانات لتصديرها.");
        return;
      }

      let table = `<table border="1"><thead><tr>
        <th>الاسم</th><th>اسم الأب</th><th>الشهرة</th><th>اسم الأم</th><th>شهرة الأم</th>
        <th>تاريخ الولادة</th><th>محل الولادة</th><th>رقم السجل</th><th>فئة الدم</th>
        <th>رقم الهاتف</th><th>رقم ولي الأمر</th><th>البريد الإلكتروني</th>
        <th>عدد أفراد الأسرة</th><th>العنوان</th><th>ملاحظات صحية</th>
      </tr></thead><tbody>`;

      members.forEach(m => {
        table += `<tr>
          <td>${esc(m.first_name || "")}</td><td>${esc(m.father_name || "")}</td><td>${esc(m.family_name || "")}</td>
          <td>${esc(m.mother_name || "")}</td><td>${esc(m.mother_family_name || "")}</td>
          <td>${esc(m.birth_date || "")}</td><td>${esc(m.birth_place || "")}</td><td>${esc(m.record_number || "")}</td>
          <td>${esc(m.blood_type || "")}</td><td>${esc(m.phone || "")}</td><td>${esc(m.parent_phone || "")}</td>
          <td>${esc(m.email || "")}</td><td>${esc(m.family_members || "")}</td><td>${esc(m.address || "")}</td>
          <td>${esc(m.health_notes || "")}</td>
        </tr>`;
      });

      table += `</tbody></table>`;
      const blob = new Blob(["\ufeff" + table], { type: "application/vnd.ms-excel;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "بيانات_باقة_العنبر.xls";
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function renderMembers() {
      membersList.innerHTML = "";

      if (members.length === 0) {
        emptyBox.style.display = "block";
        return;
      }

      emptyBox.style.display = "none";

      members.forEach((m, index) => {
        const card = document.createElement("div");
        card.className = "member-card";
        card.innerHTML = `
          <img src="${esc(m.photo || DEFAULT_PHOTO)}" class="member-photo">
          <h3 class="member-name">${esc(m.first_name || "")} ${esc(m.father_name || "")} ${esc(m.family_name || "")}</h3>
          <div class="member-actions">
            <button class="btn-show" data-action="details" data-index="${index}">التفاصيل</button>
            <button class="btn-edit" data-action="edit" data-index="${index}">تعديل</button>
          </div>
        `;
        membersList.appendChild(card);
      });
    }

    membersList.addEventListener("click", function (event) {
      const button = event.target.closest("button[data-action]");
      if (!button) return;
      const index = Number(button.dataset.index);
      if (button.dataset.action === "details") showMember(index);
      if (button.dataset.action === "edit") editMember(index);
    });

    async function logout() {
      logoutButton.disabled = true;
      logoutButton.textContent = "جاري تسجيل الخروج...";
      try {
        await db.auth.signOut();
      } finally {
        window.location.replace(LOGIN_PAGE);
      }
    }

    addMemberButton.addEventListener("click", openAddModal);
    emptyAddButton.addEventListener("click", openAddModal);
    exportButton.addEventListener("click", exportToExcel);
    logoutButton.addEventListener("click", logout);

    initializePage();
  </script>
</body>
</html>
