<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>باقة الزنبق</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
<link rel="icon" type="image/png" href="LOGO KASHEF.png">

<style>
@font-face{font-family:"Noor";src:url("Noor Regular.ttf") format("truetype");font-display:swap}
:root{--primary:#480081;--primary2:#7b1fd1;--bg:#E6E6F9;--text:#241036;--muted:#766c89;--border:#ded6f2;--danger:#dc2626;--success:#198754}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:"Noor",Tahoma,Arial,sans-serif;background:linear-gradient(135deg,#faf8ff,var(--bg));color:var(--text);padding:24px}
.page{max-width:1180px;margin:auto}
.header-card{background:#fff;border-radius:28px;padding:28px;box-shadow:0 20px 55px rgba(72,0,129,.13);display:flex;justify-content:space-between;align-items:center;gap:20px;margin-bottom:26px}
h1{color:var(--primary);font-weight:900;margin:0 0 6px;font-size:30px}
.subtitle{color:var(--muted);margin:0}
.btn-main{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;border:0;border-radius:16px;padding:13px 24px;font-weight:900}
.btn-export{background:var(--success);color:#fff;border:0;border-radius:16px;padding:13px 24px;font-weight:900}
.btn-delete{height:52px;border:0;border-radius:16px;background:var(--danger);color:#fff;font-weight:900;display:none}
.empty-box{background:#fff;border-radius:28px;padding:70px 25px;text-align:center;box-shadow:0 18px 45px rgba(72,0,129,.10)}
.empty-box h2{color:var(--primary);font-weight:900}
.members-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:22px}
.member-card{background:#fff;border-radius:26px;padding:24px;text-align:center;box-shadow:0 16px 38px rgba(72,0,129,.11)}
.member-photo{width:115px;height:115px;border-radius:24px;object-fit:cover;background:#f1eef8;margin-bottom:16px}
.member-name{color:var(--primary);font-size:21px;font-weight:900;margin-bottom:18px}
.member-actions{display:flex;gap:10px}
.member-actions button{flex:1;height:44px;border:0;border-radius:13px;font-family:inherit;font-weight:800}
.btn-show{background:#f3eefb;color:var(--primary)}
.btn-edit{background:var(--primary);color:#fff}
.modal-content{border:0;border-radius:26px;overflow:hidden}
.modal-header{background:#f7f2ff;border-bottom:1px solid var(--border)}
.modal-title{color:var(--primary);font-weight:900}
label{color:var(--primary);font-weight:800;margin-bottom:7px}
.form-control,.form-select{height:52px;border-radius:15px;border-color:var(--border)}
textarea.form-control{height:95px}
.preview-img{width:120px;height:120px;border-radius:22px;object-fit:cover;background:#f1eef8;display:none;margin-top:12px}
.detail-photo{width:130px;height:130px;border-radius:24px;object-fit:cover;background:#f1eef8;display:block;margin:0 auto 18px}
.detail-row{padding:10px 0;border-bottom:1px solid #eee8f8;color:var(--muted)}
.detail-row strong{color:var(--primary)}
@media(max-width:700px){body{padding:16px}.header-card{flex-direction:column;text-align:center}h1{font-size:24px}.member-actions{flex-direction:column}}
</style>
</head>

<body>
<main class="page">
<section class="header-card">
<div>
<h1>صفحة باقة الزنبق - البراعم</h1>
<p class="subtitle">إدارة بيانات الفرقة</p>
</div>
<div class="d-flex gap-2 flex-wrap">
<button class="btn btn-main" onclick="openAddModal()">+ إضافة عضو</button>
<button class="btn btn-export" onclick="exportToExcel()">تصدير Excel</button>
</div>
</section>

<section id="emptyBox" class="empty-box">
<h2>لا يوجد بيانات حالياً</h2>
<p class="text-muted">الرجاء إضافة بيانات أعضاء الفرقة.</p>
<button class="btn btn-main mt-3" onclick="openAddModal()">إضافة أول عضو</button>
</section>

<section id="membersList" class="members-grid"></section>
</main>

<div class="modal fade" id="memberModal" tabindex="-1">
<div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
<div class="modal-content">
<div class="modal-header">
<h5 id="modalTitle" class="modal-title">إضافة عضو جديد</h5>
<button type="button" class="btn-close ms-0" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">
<form id="memberForm">
<input type="hidden" id="editIndex">

<div class="row g-3">
<div class="col-12">
<label>صورة العضو</label>
<input type="file" id="photo" class="form-control" accept="image/*">
<img id="photoPreview" class="preview-img">
</div>

<div class="col-md-4"><label>الاسم</label><input type="text" id="firstName" class="form-control" required></div>
<div class="col-md-4"><label>اسم الأب</label><input type="text" id="fatherName" class="form-control" required></div>
<div class="col-md-4"><label>الشهرة</label><input type="text" id="familyName" class="form-control" required></div>
<div class="col-md-6"><label>اسم الأم</label><input type="text" id="motherName" class="form-control"></div>
<div class="col-md-6"><label>شهرة الأم</label><input type="text" id="motherFamilyName" class="form-control"></div>
<div class="col-md-4"><label>تاريخ الولادة</label><input type="date" id="birthDate" class="form-control"></div>
<div class="col-md-4"><label>محل الولادة</label><input type="text" id="birthPlace" class="form-control"></div>
<div class="col-md-4"><label>رقم السجل</label><input type="text" id="recordNumber" class="form-control"></div>

<div class="col-md-6">
<label>فئة الدم</label>
<select id="bloodType" class="form-select">
<option value="">اختر فئة الدم</option>
<option>A+</option><option>A-</option><option>B+</option><option>B-</option>
<option>AB+</option><option>AB-</option><option>O+</option><option>O-</option>
</select>
</div>

<div class="col-md-6"><label>رقم الهاتف</label><input type="tel" id="phone" class="form-control"></div>
<div class="col-md-6"><label>رقم ولي الأمر</label><input type="tel" id="parentPhone" class="form-control"></div>
<div class="col-md-6"><label>البريد الإلكتروني</label><input type="email" id="email" class="form-control"></div>
<div class="col-md-6"><label>عدد أفراد الأسرة</label><input type="number" id="familyMembers" class="form-control" min="1"></div>
<div class="col-md-6"><label>العنوان</label><input type="text" id="address" class="form-control"></div>
<div class="col-12"><label>ملاحظات صحية / حساسية</label><textarea id="healthNotes" class="form-control"></textarea></div>
</div>

<button type="submit" class="btn btn-main w-100 mt-4">حفظ البيانات</button>
<button type="button" id="deleteBtn" class="btn btn-delete w-100 mt-3" onclick="deleteMember()">حذف العضو</button>
</form>
</div>
</div>
</div>
</div>

<div class="modal fade" id="detailsModal" tabindex="-1">
<div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
<div class="modal-content">
<div class="modal-header">
<h5 class="modal-title">تفاصيل العضو</h5>
<button type="button" class="btn-close ms-0" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body" id="detailsBody"></div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL =
  "https://hubdemnxzldlilyyjoyh.supabase.co";

const SUPABASE_PUBLISHABLE_KEY =
  "sb_publishable_lOM6aOp6NU7nHozpTpsTSA_HfBb-Xqq";
const LEADER_USERNAME = "leader1";

const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let members = [];
let photoData = "";

const memberModal = new bootstrap.Modal(document.getElementById("memberModal"));
const detailsModal = new bootstrap.Modal(document.getElementById("detailsModal"));
const membersList = document.getElementById("membersList");
const emptyBox = document.getElementById("emptyBox");
const form = document.getElementById("memberForm");
const deleteBtn = document.getElementById("deleteBtn");

async function loadMembers(){
const {data,error}=await db.from("members").select("*").eq("leader_username",LEADER_USERNAME).order("id",{ascending:false});
if(error){alert("خطأ في تحميل البيانات: "+error.message);return;}
members=data||[];
renderMembers();
}

function openAddModal(){
form.reset();
photoData="";
document.getElementById("editIndex").value="";
document.getElementById("modalTitle").innerText="إضافة عضو جديد";
document.getElementById("photoPreview").style.display="none";
deleteBtn.style.display="none";
memberModal.show();
}

function editMember(index){
const m=members[index];
document.getElementById("editIndex").value=index;
document.getElementById("modalTitle").innerText="تعديل بيانات العضو";
deleteBtn.style.display="block";

document.getElementById("firstName").value=m.first_name||"";
document.getElementById("fatherName").value=m.father_name||"";
document.getElementById("familyName").value=m.family_name||"";
document.getElementById("motherName").value=m.mother_name||"";
document.getElementById("motherFamilyName").value=m.mother_family_name||"";
document.getElementById("birthDate").value=m.birth_date||"";
document.getElementById("birthPlace").value=m.birth_place||"";
document.getElementById("recordNumber").value=m.record_number||"";
document.getElementById("bloodType").value=m.blood_type||"";
document.getElementById("phone").value=m.phone||"";
document.getElementById("parentPhone").value=m.parent_phone||"";
document.getElementById("email").value=m.email||"";
document.getElementById("familyMembers").value=m.family_members||"";
document.getElementById("address").value=m.address||"";
document.getElementById("healthNotes").value=m.health_notes||"";

photoData=m.photo||"";
const preview=document.getElementById("photoPreview");
if(photoData){preview.src=photoData;preview.style.display="block";}else{preview.style.display="none";}
memberModal.show();
}

async function deleteMember(){
const editIndex=document.getElementById("editIndex").value;
if(editIndex==="")return;
const member=members[editIndex];
if(!confirm("هل أنت متأكد أنك تريد حذف هذا العضو؟"))return;

const {error}=await db.from("members").delete().eq("id",member.id).eq("leader_username",LEADER_USERNAME);
if(error){alert("خطأ في الحذف: "+error.message);return;}
memberModal.hide();
await loadMembers();
}

document.getElementById("photo").addEventListener("change",function(){
const file=this.files[0];
if(!file)return;
const reader=new FileReader();
reader.onload=function(e){
photoData=e.target.result;
const preview=document.getElementById("photoPreview");
preview.src=photoData;
preview.style.display="block";
};
reader.readAsDataURL(file);
});

form.addEventListener("submit",async function(e){
e.preventDefault();

const memberData={
leader_username:LEADER_USERNAME,
photo:photoData,
first_name:document.getElementById("firstName").value.trim(),
father_name:document.getElementById("fatherName").value.trim(),
family_name:document.getElementById("familyName").value.trim(),
mother_name:document.getElementById("motherName").value.trim(),
mother_family_name:document.getElementById("motherFamilyName").value.trim(),
birth_date:document.getElementById("birthDate").value||null,
birth_place:document.getElementById("birthPlace").value.trim(),
record_number:document.getElementById("recordNumber").value.trim(),
blood_type:document.getElementById("bloodType").value,
phone:document.getElementById("phone").value.trim(),
parent_phone:document.getElementById("parentPhone").value.trim(),
email:document.getElementById("email").value.trim(),
family_members:document.getElementById("familyMembers").value||null,
address:document.getElementById("address").value.trim(),
health_notes:document.getElementById("healthNotes").value.trim()
};

const editIndex=document.getElementById("editIndex").value;
let response;

if(editIndex===""){
response=await db.from("members").insert(memberData);
}else{
response=await db.from("members").update(memberData).eq("id",members[editIndex].id).eq("leader_username",LEADER_USERNAME);
}

if(response.error){alert("خطأ في حفظ البيانات: "+response.error.message);return;}

memberModal.hide();
await loadMembers();
});

function showMember(index){
const m=members[index];
document.getElementById("detailsBody").innerHTML=`
<img src="${m.photo||'LOGO KASHEF.png'}" class="detail-photo">
<div class="detail-row"><strong>الاسم الكامل:</strong> ${m.first_name||""} ${m.father_name||""} ${m.family_name||""}</div>
<div class="detail-row"><strong>اسم الأم:</strong> ${m.mother_name||"-"} ${m.mother_family_name||""}</div>
<div class="detail-row"><strong>تاريخ الولادة:</strong> ${m.birth_date||"-"}</div>
<div class="detail-row"><strong>محل الولادة:</strong> ${m.birth_place||"-"}</div>
<div class="detail-row"><strong>رقم السجل:</strong> ${m.record_number||"-"}</div>
<div class="detail-row"><strong>فئة الدم:</strong> ${m.blood_type||"-"}</div>
<div class="detail-row"><strong>رقم الهاتف:</strong> ${m.phone||"-"}</div>
<div class="detail-row"><strong>رقم ولي الأمر:</strong> ${m.parent_phone||"-"}</div>
<div class="detail-row"><strong>البريد الإلكتروني:</strong> ${m.email||"-"}</div>
<div class="detail-row"><strong>عدد أفراد الأسرة:</strong> ${m.family_members||"-"}</div>
<div class="detail-row"><strong>العنوان:</strong> ${m.address||"-"}</div>
<div class="detail-row"><strong>ملاحظات صحية:</strong> ${m.health_notes||"-"}</div>`;
detailsModal.show();
}

function exportToExcel(){
if(members.length===0){alert("لا يوجد بيانات لتصديرها.");return;}

let table=`<table border="1"><thead><tr>
<th>الاسم</th><th>اسم الأب</th><th>الشهرة</th><th>اسم الأم</th><th>شهرة الأم</th>
<th>تاريخ الولادة</th><th>محل الولادة</th><th>رقم السجل</th><th>فئة الدم</th>
<th>رقم الهاتف</th><th>رقم ولي الأمر</th><th>البريد الإلكتروني</th>
<th>عدد أفراد الأسرة</th><th>العنوان</th><th>ملاحظات صحية</th>
</tr></thead><tbody>`;

members.forEach(m=>{
table+=`<tr>
<td>${m.first_name||""}</td>
<td>${m.father_name||""}</td>
<td>${m.family_name||""}</td>
<td>${m.mother_name||""}</td>
<td>${m.mother_family_name||""}</td>
<td>${m.birth_date||""}</td>
<td>${m.birth_place||""}</td>
<td>${m.record_number||""}</td>
<td>${m.blood_type||""}</td>
<td>${m.phone||""}</td>
<td>${m.parent_phone||""}</td>
<td>${m.email||""}</td>
<td>${m.family_members||""}</td>
<td>${m.address||""}</td>
<td>${m.health_notes||""}</td>
</tr>`;
});

table+=`</tbody></table>`;
const blob=new Blob(["\ufeff"+table],{type:"application/vnd.ms-excel;charset=utf-8;"});
const link=document.createElement("a");
link.href=URL.createObjectURL(blob);
link.download="بيانات_باقة_الزنبق.xls";
document.body.appendChild(link);
link.click();
document.body.removeChild(link);
URL.revokeObjectURL(link.href);
}

function renderMembers(){
membersList.innerHTML="";
if(members.length===0){emptyBox.style.display="block";return;}
emptyBox.style.display="none";

members.forEach((m,index)=>{
const card=document.createElement("div");
card.className="member-card";
card.innerHTML=`
<img src="${m.photo||'LOGO KASHEF.png'}" class="member-photo">
<h3 class="member-name">${m.first_name||""} ${m.father_name||""} ${m.family_name||""}</h3>
<div class="member-actions">
<button class="btn-show" onclick="showMember(${index})">التفاصيل</button>
<button class="btn-edit" onclick="editMember(${index})">تعديل</button>
</div>`;
membersList.appendChild(card);
});
}

loadMembers();
</script>
</body>
</html>
