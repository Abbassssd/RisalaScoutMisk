<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  >

  <meta name="theme-color" content="#480081">

  <title>باقة الزنبق</title>

  <link
    rel="icon"
    type="image/png"
    href="./LOGO KASHEF.png"
  >

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css"
    rel="stylesheet"
  >

  <style>
    @font-face {
      font-family: "Noor";
      src: url("./fonts/Noor Regular.ttf") format("truetype");
      font-display: swap;
    }

    :root {
      --primary: #480081;
      --primary-light: #7b1fd1;
      --background: #E6E6F9;
      --text: #241036;
      --muted: #766c89;
      --border: #ded6f2;
      --white: #ffffff;
      --danger: #dc2626;
      --danger-dark: #b91c1c;
      --success: #198754;
      --success-dark: #146c43;
    }

    * {
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;

      font-family:
        "Noor",
        Tahoma,
        Arial,
        sans-serif;

      color: var(--text);

      background:
        radial-gradient(
          circle at top right,
          rgba(72, 0, 129, 0.16),
          transparent 30%
        ),
        linear-gradient(
          135deg,
          #faf8ff,
          var(--background)
        );
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
      touch-action: manipulation;
    }

    .page {
      width: 100%;
      max-width: 1180px;
      margin: auto;
    }

    .header-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;

      margin-bottom: 26px;
      padding: 28px;

      background: var(--white);

      border-radius: 28px;

      box-shadow:
        0 20px 55px
        rgba(72, 0, 129, 0.13);
    }

    .header-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header-logo {
      width: 70px;
      height: 70px;

      padding: 8px;

      object-fit: contain;

      background: #f3eff9;

      border-radius: 20px;
    }

    h1 {
      margin: 0 0 6px;

      color: var(--primary);

      font-size: 30px;
      font-weight: 900;
    }

    .subtitle {
      margin: 0;

      color: var(--muted);
    }

    .account-info {
      margin-top: 5px;

      color: var(--primary);

      font-size: 13px;
      font-weight: 800;
    }

    .header-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .app-button {
      min-height: 48px;

      padding: 12px 22px;

      border: 0;
      border-radius: 16px;

      font-weight: 900;

      cursor: pointer;

      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease;
    }

    .app-button:hover {
      transform: translateY(-1px);
    }

    .button-primary {
      color: white;

      background:
        linear-gradient(
          135deg,
          var(--primary),
          var(--primary-light)
        );

      box-shadow:
        0 12px 26px
        rgba(72, 0, 129, 0.22);
    }

    .button-export {
      color: white;
      background: var(--success);
    }

    .button-export:hover {
      background: var(--success-dark);
    }

    .button-logout {
      color: var(--danger);

      background: #fff0f0;

      border:
        1px solid
        #ffcaca;
    }

    .status-message {
      display: none;

      margin-bottom: 20px;
      padding: 14px 16px;

      border-radius: 15px;

      font-weight: 800;
      line-height: 1.7;
    }

    .status-message.error {
      display: block;

      color: #a61b1b;

      background: #fff0f0;

      border:
        1px solid
        #ffc4c4;
    }

    .status-message.success {
      display: block;

      color: #146c43;

      background: #ecfff4;

      border:
        1px solid
        #a8e5c2;
    }

    .empty-box {
      padding: 70px 25px;

      text-align: center;

      background: var(--white);

      border-radius: 28px;

      box-shadow:
        0 18px 45px
        rgba(72, 0, 129, 0.10);
    }

    .empty-box h2 {
      color: var(--primary);
      font-weight: 900;
    }

    .members-grid {
      display: grid;

      grid-template-columns:
        repeat(
          auto-fill,
          minmax(240px, 1fr)
        );

      gap: 22px;
    }

    .member-card {
      padding: 24px;

      text-align: center;

      background: var(--white);

      border:
        1px solid
        #eee9f7;

      border-radius: 26px;

      box-shadow:
        0 16px 38px
        rgba(72, 0, 129, 0.11);

      transition:
        transform 0.22s ease,
        box-shadow 0.22s ease;
    }

    .member-card:hover {
      transform: translateY(-4px);

      box-shadow:
        0 22px 50px
        rgba(72, 0, 129, 0.17);
    }

    .member-photo {
      width: 115px;
      height: 115px;

      margin-bottom: 16px;

      object-fit: cover;

      background: #f1eef8;

      border-radius: 24px;
    }

    .member-name {
      min-height: 62px;

      margin-bottom: 18px;

      color: var(--primary);

      font-size: 21px;
      font-weight: 900;
      line-height: 1.5;
    }

    .member-actions {
      display: flex;
      gap: 10px;
    }

    .member-actions button {
      flex: 1;

      min-height: 44px;

      border: 0;
      border-radius: 13px;

      font-weight: 800;

      cursor: pointer;
    }

    .button-details {
      color: var(--primary);
      background: #f3eefb;
    }

    .button-edit {
      color: white;
      background: var(--primary);
    }

    .modal-content {
      overflow: hidden;

      border: 0;
      border-radius: 26px;
    }

    .modal-header {
      background: #f7f2ff;

      border-bottom:
        1px solid
        var(--border);
    }

    .modal-title,
    .form-label {
      color: var(--primary);
      font-weight: 900;
    }

    .form-control,
    .form-select {
      min-height: 52px;

      border-color: var(--border);
      border-radius: 15px;

      box-shadow: none;
    }

    .form-control:focus,
    .form-select:focus {
      border-color: var(--primary);

      box-shadow:
        0 0 0 0.22rem
        rgba(72, 0, 129, 0.11);
    }

    textarea.form-control {
      min-height: 100px;
      resize: vertical;
    }

    .preview-image {
      display: none;

      width: 120px;
      height: 120px;

      margin-top: 12px;

      object-fit: cover;

      background: #f1eef8;

      border-radius: 22px;
    }

    .button-save {
      width: 100%;
      min-height: 54px;

      margin-top: 24px;

      color: white;

      background:
        linear-gradient(
          135deg,
          var(--primary),
          var(--primary-light)
        );

      border: 0;
      border-radius: 16px;

      font-weight: 900;

      cursor: pointer;
    }

    .button-delete {
      display: none;

      width: 100%;
      min-height: 52px;

      margin-top: 12px;

      color: white;
      background: var(--danger);

      border: 0;
      border-radius: 16px;

      font-weight: 900;

      cursor: pointer;
    }

    .button-delete:hover {
      background: var(--danger-dark);
    }

    .detail-photo {
      display: block;

      width: 130px;
      height: 130px;

      margin:
        0 auto 18px;

      object-fit: cover;

      background: #f1eef8;

      border-radius: 24px;
    }

    .detail-row {
      padding: 10px 0;

      color: var(--muted);

      border-bottom:
        1px solid
        #eee8f8;

      overflow-wrap: anywhere;
    }

    .detail-row strong {
      color: var(--primary);
    }

    .loading-overlay {
      position: fixed;
      inset: 0;

      z-index: 3000;

      display: grid;
      place-items: center;

      padding: 20px;

      background:
        rgba(246, 243, 253, 0.94);
    }

    .loading-card {
      width: 100%;
      max-width: 350px;

      padding: 28px;

      text-align: center;

      background: white;

      border-radius: 24px;

      box-shadow:
        0 24px 70px
        rgba(72, 0, 129, 0.20);
    }

    .spinner-border {
      color: var(--primary);
    }

    @media (max-width: 760px) {
      body {
        padding: 14px;
      }

      .header-card {
        flex-direction: column;
        align-items: stretch;

        padding: 20px;
      }

      .header-info {
        align-items: flex-start;
      }

      .header-actions {
        display: grid;

        grid-template-columns:
          1fr 1fr;
      }

      .button-logout {
        grid-column:
          1 / -1;
      }

      h1 {
        font-size: 24px;
      }

      .member-actions {
        flex-direction: column;
      }
    }

    @media (max-width: 430px) {
      .header-actions {
        grid-template-columns:
          1fr;
      }

      .button-logout {
        grid-column: auto;
      }

      .header-logo {
        width: 58px;
        height: 58px;
      }
    }
  </style>
</head>

<body>

  <div id="loadingOverlay" class="loading-overlay">
    <div class="loading-card">
      <div
        class="spinner-border"
        role="status"
        aria-label="جاري التحميل"
      ></div>

      <p
        id="loadingText"
        class="mt-3 mb-0"
      >
        جاري التحقق من الحساب...
      </p>
    </div>
  </div>

  <main class="page">

    <section class="header-card">

      <div class="header-info">

        <img
          src="./LOGO KASHEF.png"
          alt="شعار كشافة الرسالة الإسلامية"
          class="header-logo"
        >

        <div>
          <h1>
            صفحة باقة الزنبق - البراعم
          </h1>

          <p class="subtitle">
            إدارة بيانات فرقة البراعم 
          </p>

          <p
            id="accountInfo"
            class="account-info"
          ></p>
        </div>

      </div>

      <div class="header-actions">

        <button
          type="button"
          id="addMemberButton"
          class="app-button button-primary"
        >
          + إضافة عضو
        </button>

        <button
          type="button"
          id="exportButton"
          class="app-button button-export"
        >
          تصدير Excel
        </button>

        <button
          type="button"
          id="logoutButton"
          class="app-button button-logout"
        >
          تسجيل الخروج
        </button>

      </div>

    </section>

    <div
      id="statusMessage"
      class="status-message"
      role="alert"
    ></div>

    <section
      id="emptyBox"
      class="empty-box"
      hidden
    >

      <h2>
        لا توجد بيانات حالياً
      </h2>

      <p class="text-muted">
        الرجاء إضافة بيانات أعضاء الفرقة.
      </p>

      <button
        type="button"
        id="emptyAddButton"
        class="app-button button-primary mt-3"
      >
        إضافة أول عضو
      </button>

    </section>

    <section
      id="membersList"
      class="members-grid"
    ></section>

  </main>

  <div
    class="modal fade"
    id="memberModal"
    tabindex="-1"
    aria-hidden="true"
  >

    <div
      class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable"
    >

      <div class="modal-content">

        <div class="modal-header">

          <h2
            id="memberModalTitle"
            class="modal-title fs-5"
          >
            إضافة عضو جديد
          </h2>

          <button
            type="button"
            class="btn-close ms-0"
            data-bs-dismiss="modal"
            aria-label="إغلاق"
          ></button>

        </div>

        <div class="modal-body">

          <form id="memberForm">

            <input
              type="hidden"
              id="editingMemberId"
            >

            <div class="row g-3">

              <div class="col-12">

                <label
                  for="photo"
                  class="form-label"
                >
                  صورة العضو
                </label>

                <input
                  type="file"
                  id="photo"
                  class="form-control"
                  accept="image/jpeg,image/png,image/webp"
                >

                <img
                  id="photoPreview"
                  class="preview-image"
                  alt="معاينة الصورة"
                >

              </div>

              <div class="col-md-4">

                <label
                  for="firstName"
                  class="form-label"
                >
                  الاسم
                </label>

                <input
                  type="text"
                  id="firstName"
                  class="form-control"
                  maxlength="80"
                  required
                >

              </div>

              <div class="col-md-4">

                <label
                  for="fatherName"
                  class="form-label"
                >
                  اسم الأب
                </label>

                <input
                  type="text"
                  id="fatherName"
                  class="form-control"
                  maxlength="80"
                >

              </div>

              <div class="col-md-4">

                <label
                  for="familyName"
                  class="form-label"
                >
                  الشهرة
                </label>

                <input
                  type="text"
                  id="familyName"
                  class="form-control"
                  maxlength="80"
                  required
                >

              </div>

              <div class="col-md-6">

                <label
                  for="motherName"
                  class="form-label"
                >
                  اسم الأم
                </label>

                <input
                  type="text"
                  id="motherName"
                  class="form-control"
                  maxlength="80"
                >

              </div>

              <div class="col-md-6">

                <label
                  for="motherFamilyName"
                  class="form-label"
                >
                  شهرة الأم
                </label>

                <input
                  type="text"
                  id="motherFamilyName"
                  class="form-control"
                  maxlength="80"
                >

              </div>

              <div class="col-md-4">

                <label
                  for="birthDate"
                  class="form-label"
                >
                  تاريخ الولادة
                </label>

                <input
                  type="date"
                  id="birthDate"
                  class="form-control"
                >

              </div>

              <div class="col-md-4">

                <label
                  for="birthPlace"
                  class="form-label"
                >
                  محل الولادة
                </label>

                <input
                  type="text"
                  id="birthPlace"
                  class="form-control"
                  maxlength="120"
                >

              </div>

              <div class="col-md-4">

                <label
                  for="recordNumber"
                  class="form-label"
                >
                  رقم السجل
                </label>

                <input
                  type="text"
                  id="recordNumber"
                  class="form-control"
                  maxlength="80"
                >

              </div>

              <div class="col-md-6">

                <label
                  for="bloodType"
                  class="form-label"
                >
                  فئة الدم
                </label>

                <select
                  id="bloodType"
                  class="form-select"
                >
                  <option value="">
                    اختر فئة الدم
                  </option>

                  <option>A+</option>
                  <option>A-</option>
                  <option>B+</option>
                  <option>B-</option>
                  <option>AB+</option>
                  <option>AB-</option>
                  <option>O+</option>
                  <option>O-</option>
                </select>

              </div>

              <div class="col-md-6">

                <label
                  for="phone"
                  class="form-label"
                >
                  رقم الهاتف
                </label>

                <input
                  type="tel"
                  id="phone"
                  class="form-control"
                  maxlength="30"
                >

              </div>

              <div class="col-md-6">

                <label
                  for="parentPhone"
                  class="form-label"
                >
                  رقم ولي الأمر
                </label>

                <input
                  type="tel"
                  id="parentPhone"
                  class="form-control"
                  maxlength="30"
                >

              </div>

              <div class="col-md-6">

                <label
                  for="email"
                  class="form-label"
                >
                  البريد الإلكتروني
                </label>

                <input
                  type="email"
                  id="email"
                  class="form-control"
                  maxlength="160"
                >

              </div>

              <div class="col-md-6">

                <label
                  for="familyMembers"
                  class="form-label"
                >
                  عدد أفراد الأسرة
                </label>

                <input
                  type="number"
                  id="familyMembers"
                  class="form-control"
                  min="1"
                  max="100"
                >

              </div>

              <div class="col-md-6">

                <label
                  for="address"
                  class="form-label"
                >
                  العنوان
                </label>

                <input
                  type="text"
                  id="address"
                  class="form-control"
                  maxlength="250"
                >

              </div>

              <div class="col-12">

                <label
                  for="healthNotes"
                  class="form-label"
                >
                  ملاحظات صحية / حساسية
                </label>

                <textarea
                  id="healthNotes"
                  class="form-control"
                  maxlength="1000"
                ></textarea>

              </div>

            </div>

            <button
              type="submit"
              id="saveButton"
              class="button-save"
            >
              حفظ البيانات
            </button>

            <button
              type="button"
              id="deleteButton"
              class="button-delete"
            >
              حذف العضو
            </button>

          </form>

        </div>

      </div>

    </div>

  </div>

  <div
    class="modal fade"
    id="detailsModal"
    tabindex="-1"
    aria-hidden="true"
  >

    <div
      class="modal-dialog modal-dialog-centered modal-dialog-scrollable"
    >

      <div class="modal-content">

        <div class="modal-header">

          <h2 class="modal-title fs-5">
            تفاصيل العضو
          </h2>

          <button
            type="button"
            class="btn-close ms-0"
            data-bs-dismiss="modal"
            aria-label="إغلاق"
          ></button>

        </div>

        <div
          class="modal-body"
          id="detailsBody"
        ></div>

      </div>

    </div>

  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  ></script>

  <script

        "status-message " + type;
    }

    function clearStatus() {
      statusMessage.textContent = "";

      statusMessage.className =
        "status-message";
    }

    function escapeHtml(
      value
    ) {
      return String(
        value ?? ""
      )
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function displayValue(
      value
    ) {
      if (
        value === null ||
        value === undefined ||
        value === ""
      ) {
        return "-";
      }

      return escapeHtml(value);
    }

    async function initializePage() {
      try {
        setLoading(
          true,
          "جاري التحقق من الحساب..."
        );

        const {
          data: {
            session
          },
          error: sessionError
        } =
          await db.auth.getSession();

        if (sessionError) {
          throw sessionError;
        }

        if (
          !session ||
          !session.user
        ) {
          window.location.replace(
            LOGIN_PAGE
          );

          return;
        }

        currentUser =
          session.user;

        const {
          data: profile,
          error: profileError
        } =
          await db
            .from("profiles")
            .select(
              "id, leader_username, role"
            )
            .eq(
              "id",
              currentUser.id
            )
            .single();

        if (profileError) {
          throw new Error(
            "تعذر تحميل ملف الحساب: " +
            profileError.message
          );
        }

        if (
          profile.role !== "leader" ||
          profile.leader_username !==
            REQUIRED_LEADER
        ) {
          await db.auth.signOut();

          window.location.replace(
            LOGIN_PAGE
          );

          return;
        }

        currentProfile =
          profile;

        accountInfo.textContent =
          "الحساب: " +
          profile.leader_username +
          " — " +
          (
            currentUser.email || ""
          );

        await loadMembers();
      } catch (error) {
        console.error(error);

        showStatus(
          error instanceof Error
            ? error.message
            : "حدث خطأ أثناء فتح الصفحة."
        );
      } finally {
        setLoading(false);
      }
    }

    async function loadMembers() {
      clearStatus();

      const {
        data,
        error
      } =
        await db
          .from("members")
          .select("*")
          .eq(
            "owner_id",
            currentUser.id
          )
          .order(
            "id",
            {
              ascending: false
            }
          );

      if (error) {
        showStatus(
          "خطأ في تحميل البيانات: " +
          error.message
        );

        return;
      }

      members =
        data || [];

      renderMembers();
    }

    function resetMemberForm() {
      memberForm.reset();

      fields.editingMemberId.value =
        "";

      photoData = "";

      fields.photoPreview.removeAttribute(
        "src"
      );

      fields.photoPreview.style.display =
        "none";

      deleteButton.style.display =
        "none";

      saveButton.disabled =
        false;

      saveButton.textContent =
        "حفظ البيانات";
    }

    function openAddModal() {
      clearStatus();

      resetMemberForm();

      memberModalTitle.textContent =
        "إضافة عضو جديد";

      memberModal.show();
    }

    function editMember(
      memberId
    ) {
      const member =
        members.find(
          item =>
            String(item.id) ===
            String(memberId)
        );

      if (!member) {
        showStatus(
          "تعذر العثور على بيانات العضو."
        );

        return;
      }

      resetMemberForm();

      fields.editingMemberId.value =
        member.id;

      memberModalTitle.textContent =
        "تعديل بيانات العضو";

      deleteButton.style.display =
        "block";

      fields.firstName.value =
        member.first_name || "";

      fields.fatherName.value =
        member.father_name || "";

      fields.familyName.value =
        member.family_name || "";

      fields.motherName.value =
        member.mother_name || "";

      fields.motherFamilyName.value =
        member.mother_family_name || "";

      fields.birthDate.value =
        member.birth_date || "";

      fields.birthPlace.value =
        member.birth_place || "";

      fields.recordNumber.value =
        member.record_number || "";

      fields.bloodType.value =
        member.blood_type || "";

      fields.phone.value =
        member.phone || "";

      fields.parentPhone.value =
        member.parent_phone || "";

      fields.email.value =
        member.email || "";

      fields.familyMembers.value =
        member.family_members || "";

      fields.address.value =
        member.address || "";

      fields.healthNotes.value =
        member.health_notes || "";

      photoData =
        member.photo || "";

      if (photoData) {
        fields.photoPreview.src =
          photoData;

        fields.photoPreview.style.display =
          "block";
      }

      memberModal.show();
    }

    fields.photo.addEventListener(
      "change",
      function () {
        const file =
          this.files[0];

        if (!file) {
          return;
        }

        if (
          file.size >
          2 * 1024 * 1024
        ) {
          showStatus(
            "حجم الصورة كبير. الحد الأقصى 2MB."
          );

          this.value = "";

          return;
        }

        const allowedTypes = [
          "image/jpeg",
          "image/png",
          "image/webp"
        ];

        if (
          !allowedTypes.includes(
            file.type
          )
        ) {
          showStatus(
            "نوع الصورة غير مدعوم."
          );

          this.value = "";

          return;
        }

        const reader =
          new FileReader();

        reader.onload =
          function (event) {
            photoData =
              event.target.result;

            fields.photoPreview.src =
              photoData;

            fields.photoPreview.style.display =
              "block";
          };

        reader.readAsDataURL(
          file
        );
      }
    );

    memberForm.addEventListener(
      "submit",
      async function (
        event
      ) {
        event.preventDefault();

        clearStatus();

        if (
          !currentUser ||
          !currentProfile
        ) {
          showStatus(
            "الجلسة غير صالحة. أعد تسجيل الدخول."
          );

          return;
        }

        const memberData = {
          owner_id:
            currentUser.id,

          leader_username:
            currentProfile.leader_username,

          photo:
            photoData || null,

          first_name:
            fields.firstName.value.trim(),

          father_name:
            fields.fatherName.value.trim(),

          family_name:
            fields.familyName.value.trim(),

          mother_name:
            fields.motherName.value.trim(),

          mother_family_name:
            fields.motherFamilyName.value.trim(),

          birth_date:
            fields.birthDate.value ||
            null,

          birth_place:
            fields.birthPlace.value.trim(),

          record_number:
            fields.recordNumber.value.trim(),

          blood_type:
            fields.bloodType.value,

          phone:
            fields.phone.value.trim(),

          parent_phone:
            fields.parentPhone.value.trim(),

          email:
            fields.email.value.trim(),

          family_members:
            fields.familyMembers.value
              ? Number(
                  fields.familyMembers.value
                )
              : null,

          address:
            fields.address.value.trim(),

          health_notes:
            fields.healthNotes.value.trim()
        };

        if (
          !memberData.first_name ||
          !memberData.family_name
        ) {
          showStatus(
            "الاسم والشهرة مطلوبان."
          );

          return;
        }

        saveButton.disabled =
          true;

        saveButton.textContent =
          "جاري الحفظ...";

        try {
          const editingId =
            fields.editingMemberId.value;

          let response;

          if (!editingId) {
            response =
              await db
                .from("members")
                .insert(
                  memberData
                );
          } else {
            response =
              await db
                .from("members")
                .update(
                  memberData
                )
                .eq(
                  "id",
                  editingId
                )
                .eq(
                  "owner_id",
                  currentUser.id
                );
          }

          if (response.error) {
            throw response.error;
          }

          memberModal.hide();

          showStatus(
            editingId
              ? "تم تعديل بيانات العضو بنجاح."
              : "تمت إضافة العضو بنجاح.",
            "success"
          );

          await loadMembers();
        } catch (error) {
          console.error(error);

          showStatus(
            "خطأ في حفظ البيانات: " +
            (
              error.message ||
              "خطأ غير معروف"
            )
          );
        } finally {
          saveButton.disabled =
            false;

          saveButton.textContent =
            "حفظ البيانات";
        }
      }
    );

    deleteButton.addEventListener(
      "click",
      async function () {
        const editingId =
          fields.editingMemberId.value;

        if (!editingId) {
          return;
        }

        const confirmed =
          window.confirm(
            "هل أنت متأكد من حذف هذا العضو؟"
          );

        if (!confirmed) {
          return;
        }

        deleteButton.disabled =
          true;

        deleteButton.textContent =
          "جاري الحذف...";

        try {
          const {
            error
          } =
            await db
              .from("members")
              .delete()
              .eq(
                "id",
                editingId
              )
              .eq(
                "owner_id",
                currentUser.id
              );

          if (error) {
            throw error;
          }

          memberModal.hide();

          showStatus(
            "تم حذف العضو بنجاح.",
            "success"
          );

          await loadMembers();
        } catch (error) {
          console.error(error);

          showStatus(
            "خطأ في حذف العضو: " +
            (
              error.message ||
              "خطأ غير معروف"
            )
          );
        } finally {
          deleteButton.disabled =
            false;

          deleteButton.textContent =
            "حذف العضو";
        }
      }
    );

    function showMember(
      memberId
    ) {
      const member =
        members.find(
          item =>
            String(item.id) ===
            String(memberId)
        );

      if (!member) {
        return;
      }

      detailsBody.innerHTML = `
        <img
          src="${escapeHtml(
            member.photo ||
            DEFAULT_PHOTO
          )}"
          class="detail-photo"
          alt="صورة العضو"
        >

        <div class="detail-row">
          <strong>الاسم الكامل:</strong>
          ${displayValue(
            member.first_name
          )}
          ${displayValue(
            member.father_name
          )}
          ${displayValue(
            member.family_name
          )}
        </div>

        <div class="detail-row">
          <strong>اسم الأم:</strong>
          ${displayValue(
            member.mother_name
          )}
          ${displayValue(
            member.mother_family_name
          )}
        </div>

        <div class="detail-row">
          <strong>تاريخ الولادة:</strong>
          ${displayValue(
            member.birth_date
          )}
        </div>

        <div class="detail-row">
          <strong>محل الولادة:</strong>
          ${displayValue(
            member.birth_place
          )}
        </div>

        <div class="detail-row">
          <strong>رقم السجل:</strong>
          ${displayValue(
            member.record_number
          )}
        </div>

        <div class="detail-row">
          <strong>فئة الدم:</strong>
          ${displayValue(
            member.blood_type
          )}
        </div>

        <div class="detail-row">
          <strong>رقم الهاتف:</strong>
          ${displayValue(
            member.phone
          )}
        </div>

        <div class="detail-row">
          <strong>رقم ولي الأمر:</strong>
          ${displayValue(
            member.parent_phone
          )}
        </div>

        <div class="detail-row">
          <strong>البريد الإلكتروني:</strong>
          ${displayValue(
            member.email
          )}
        </div>

        <div class="detail-row">
          <strong>عدد أفراد الأسرة:</strong>
          ${displayValue(
            member.family_members
          )}
        </div>

        <div class="detail-row">
          <strong>العنوان:</strong>
          ${displayValue(
            member.address
          )}
        </div>

        <div class="detail-row">
          <strong>ملاحظات صحية:</strong>
          ${displayValue(
            member.health_notes
          )}
        </div>
      `;

      detailsModal.show();
    }

    function renderMembers() {
      membersList.innerHTML = "";

      if (
        members.length === 0
      ) {
        emptyBox.hidden =
          false;

        return;
      }

      emptyBox.hidden =
        true;

      members.forEach(
        function (
          member
        ) {
          const card =
            document.createElement(
              "article"
            );

          card.className =
            "member-card";

          const fullName = [
            member.first_name,
            member.father_name,
            member.family_name
          ]
            .filter(Boolean)
            .join(" ");

          card.innerHTML = `
            <img
              src="${escapeHtml(
                member.photo ||
                DEFAULT_PHOTO
              )}"
              class="member-photo"
              alt="صورة ${escapeHtml(
                fullName
              )}"
            >

            <h3 class="member-name">
              ${escapeHtml(
                fullName
              )}
            </h3>

            <div class="member-actions">

              <button
                type="button"
                class="button-details"
                data-action="details"
                data-id="${escapeHtml(
                  member.id
                )}"
              >
                التفاصيل
              </button>

              <button
                type="button"
                class="button-edit"
                data-action="edit"
                data-id="${escapeHtml(
                  member.id
                )}"
              >
                تعديل
              </button>

            </div>
          `;

          membersList.appendChild(
            card
          );
        }
      );
    }

    membersList.addEventListener(
      "click",
      function (
        event
      ) {
        const button =
          event.target.closest(
            "button[data-action]"
          );

        if (!button) {
          return;
        }

        const memberId =
          button.dataset.id;

        const action =
          button.dataset.action;

        if (
          action === "details"
        ) {
          showMember(
            memberId
          );
        }

        if (
          action === "edit"
        ) {
          editMember(
            memberId
          );
        }
      }
    );

    function exportToExcel() {
      if (
        members.length === 0
      ) {
        showStatus(
          "لا توجد بيانات لتصديرها."
        );

        return;
      }

      let table = `
        <table border="1">
          <thead>
            <tr>
              <th>الاسم</th>
              <th>اسم الأب</th>
              <th>الشهرة</th>
              <th>اسم الأم</th>
              <th>شهرة الأم</th>
              <th>تاريخ الولادة</th>
              <th>محل الولادة</th>
              <th>رقم السجل</th>
              <th>فئة الدم</th>
              <th>رقم الهاتف</th>
              <th>رقم ولي الأمر</th>
              <th>البريد الإلكتروني</th>
              <th>عدد أفراد الأسرة</th>
              <th>العنوان</th>
              <th>ملاحظات صحية</th>
            </tr>
          </thead>

          <tbody>
      `;

      members.forEach(
        function (
          member
        ) {
          table += `
            <tr>
              <td>${escapeHtml(
                member.first_name || ""
              )}</td>

              <td>${escapeHtml(
                member.father_name || ""
              )}</td>

              <td>${escapeHtml(
                member.family_name || ""
              )}</td>

              <td>${escapeHtml(
                member.mother_name || ""
              )}</td>

              <td>${escapeHtml(
                member.mother_family_name || ""
              )}</td>

              <td>${escapeHtml(
                member.birth_date || ""
              )}</td>

              <td>${escapeHtml(
                member.birth_place || ""
              )}</td>

              <td>${escapeHtml(
                member.record_number || ""
              )}</td>

              <td>${escapeHtml(
                member.blood_type || ""
              )}</td>

              <td>${escapeHtml(
                member.phone || ""
              )}</td>

              <td>${escapeHtml(
                member.parent_phone || ""
              )}</td>

              <td>${escapeHtml(
                member.email || ""
              )}</td>

              <td>${escapeHtml(
                member.family_members || ""
              )}</td>

              <td>${escapeHtml(
                member.address || ""
              )}</td>

              <td>${escapeHtml(
                member.health_notes || ""
              )}</td>
            </tr>
          `;
        }
      );

      table += `
          </tbody>
        </table>
      `;

      const blob =
        new Blob(
          [
            "\ufeff" +
            table
          ],
          {
            type:
              "application/vnd.ms-excel;charset=utf-8;"
          }
        );

      const objectUrl =
        URL.createObjectURL(
          blob
        );

      const link =
        document.createElement(
          "a"
        );

      link.href =
        objectUrl;

      link.download =
        "بيانات_باقة_الزنبق.xls";

      document.body.appendChild(
        link
      );

      link.click();

      link.remove();

      URL.revokeObjectURL(
        objectUrl
      );
    }

    async function logout() {
      logoutButton.disabled =
        true;

      logoutButton.textContent =
        "جاري تسجيل الخروج...";

      try {
        await db.auth.signOut();
      } finally {
        window.location.replace(
          LOGIN_PAGE
        );
      }
    }

    addMemberButton.addEventListener(
      "click",
      openAddModal
    );

    emptyAddButton.addEventListener(
      "click",
      openAddModal
    );

    exportButton.addEventListener(
      "click",
      exportToExcel
    );

    logoutButton.addEventListener(
      "click",
      logout
    );

    initializePage();
  </script>

</body>
</html>
