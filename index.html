<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  >

  <meta name="theme-color" content="#480081">

  <title>جمعية كشافة الرسالة الإسلامية</title>

  <link
    rel="icon"
    type="image/png"
    href="./LOGO KASHEF.png"
  >

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css"
    rel="stylesheet"
  >

  <style>
    @font-face {
      font-family: "Noor";
      src: url("./fonts/Noor Regular.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --primary: #480081;
      --primary-light: #7b1fd1;
      --background: #E6E6F9;
      --text: #231033;
      --muted: #7b7390;
      --border: #ded6f2;
      --white: #ffffff;
      --danger: #c62828;
      --success: #198754;
    }

    * {
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      min-height: 100vh;
      margin: 0;

      font-family:
        "Noor",
        "Tajawal",
        Arial,
        sans-serif;

      color: var(--text);

      background:
        radial-gradient(
          circle at 15% 20%,
          rgba(123, 31, 209, 0.20),
          transparent 28%
        ),
        radial-gradient(
          circle at 85% 80%,
          rgba(72, 0, 129, 0.22),
          transparent 32%
        ),
        linear-gradient(
          135deg,
          #f8f6ff,
          var(--background)
        );

      display: flex;
      align-items: center;
      justify-content: center;

      padding: 18px;
      overflow-x: hidden;
    }

    input,
    button,
    textarea,
    select {
      font: inherit;
      touch-action: manipulation;
    }

    .page-bg-shape {
      position: fixed;

      width: 280px;
      height: 280px;

      border-radius: 50%;

      background:
        linear-gradient(
          135deg,
          rgba(72, 0, 129, 0.18),
          rgba(123, 31, 209, 0.08)
        );

      filter: blur(6px);

      z-index: -1;
      pointer-events: none;
    }

    .shape-1 {
      top: -90px;
      right: -70px;
    }

    .shape-2 {
      bottom: -110px;
      left: -80px;
    }

    .login-card {
      position: relative;
      z-index: 100;

      width: 100%;
      max-width: 460px;

      background: rgba(255, 255, 255, 0.95);

      border:
        1px solid
        rgba(255, 255, 255, 0.95);

      border-radius: 30px;

      padding: 34px 32px 28px;

      box-shadow:
        0 28px 80px
        rgba(72, 0, 129, 0.20);

      overflow: hidden;
    }

    .login-card::before {
      content: "";

      position: absolute;

      top: -85px;
      right: -85px;

      width: 190px;
      height: 190px;

      border-radius: 50%;

      background:
        rgba(72, 0, 129, 0.10);

      z-index: 0;
      pointer-events: none;
    }

    .login-card > * {
      position: relative;
      z-index: 2;
    }

    .logo-box {
      width: 130px;
      height: 130px;

      margin:
        0 auto 18px;

      border-radius: 34px;

      background:
        linear-gradient(
          145deg,
          #ffffff,
          #f1eaff
        );

      display: flex;
      align-items: center;
      justify-content: center;

      box-shadow:
        0 18px 38px
        rgba(72, 0, 129, 0.18);
    }

    .logo-box img {
      width: 98px;
      height: 98px;

      object-fit: contain;
    }

    .portal-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;

      background:
        rgba(72, 0, 129, 0.09);

      color: var(--primary);

      border:
        1px solid
        rgba(72, 0, 129, 0.13);

      border-radius: 999px;

      padding: 7px 15px;

      font-size: 13px;
      font-weight: 700;

      margin-bottom: 12px;
    }

    .portal-badge span {
      width: 8px;
      height: 8px;

      background: var(--primary);

      border-radius: 50%;

      box-shadow:
        0 0 0 5px
        rgba(72, 0, 129, 0.10);
    }

    h1 {
      color: var(--primary);

      font-size: 25px;
      line-height: 1.55;
      font-weight: 900;

      margin-bottom: 6px;

      text-align: center;
    }

    .subtitle {
      color: var(--muted);

      font-size: 14px;

      text-align: center;

      margin-bottom: 26px;
    }

    .form-label {
      color: var(--primary);

      font-size: 14px;
      font-weight: 800;

      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
      z-index: 10;
    }

    .form-control {
      position: relative;
      z-index: 20;

      height: 54px;

      border-radius: 17px;

      border:
        1px solid
        var(--border);

      padding:
        0 18px;

      padding-left: 48px;

      color: var(--text);

      font-size: 16px;

      background-color:
        rgba(255, 255, 255, 0.98);

      box-shadow: none;

      transition:
        0.25s ease;

      pointer-events: auto;

      -webkit-appearance: none;
      appearance: none;
    }

    .form-control::placeholder {
      color: #9c95ad;
    }

    .form-control:focus {
      border-color: var(--primary);

      box-shadow:
        0 0 0 0.25rem
        rgba(72, 0, 129, 0.12);

      outline: none;
    }

    .input-icon,
    .toggle-password {
      position: absolute;

      top: 50%;

      transform:
        translateY(-50%);

      color: var(--primary);

      opacity: 0.75;

      z-index: 30;
    }

    .input-icon {
      left: 18px;

      pointer-events: none;

      font-size: 18px;
    }

    .toggle-password {
      left: 14px;

      border: none;

      background: transparent;

      cursor: pointer;

      font-size: 18px;

      padding: 4px;

      pointer-events: auto;

      -webkit-appearance: none;
      appearance: none;
    }

    .password-input {
      padding-left: 52px;
    }

    .btn-login {
      position: relative;
      z-index: 20;

      width: 100%;
      height: 56px;

      border: none;
      border-radius: 17px;

      background:
        linear-gradient(
          135deg,
          var(--primary),
          var(--primary-light)
        );

      color: var(--white);

      font-size: 18px;
      font-weight: 900;

      box-shadow:
        0 16px 32px
        rgba(72, 0, 129, 0.27);

      transition:
        0.25s ease;

      pointer-events: auto;

      -webkit-appearance: none;
      appearance: none;
    }

    .btn-login:hover:not(:disabled) {
      color: var(--white);

      transform:
        translateY(-2px);

      box-shadow:
        0 20px 42px
        rgba(72, 0, 129, 0.34);
    }

    .btn-login:disabled {
      opacity: 0.7;
      cursor: wait;
    }

    .login-message {
      display: none;

      margin-top: 16px;

      padding: 14px;

      border-radius: 14px;

      text-align: center;

      font-weight: 800;
      font-size: 13px;

      line-height: 1.7;

      animation:
        fadeIn 0.25s ease;
    }

    .login-message.error {
      display: block;

      background: #FFECEC;

      border:
        1px solid
        #FFB6B6;

      color: var(--danger);
    }

    .login-message.success {
      display: block;

      background: #ECFFF4;

      border:
        1px solid
        #A8E5C2;

      color: var(--success);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;

        transform:
          translateY(-5px);
      }

      to {
        opacity: 1;

        transform:
          translateY(0);
      }
    }

    .security-note,
    .footer {
      color: var(--muted);

      font-size: 12px;

      text-align: center;
    }

    .security-note {
      margin-top: 22px;
      margin-bottom: 10px;

      line-height: 1.8;
    }

    .footer {
      margin: 0;
    }

    @media (max-width: 480px) {
      body {
        padding: 14px;
      }

      .login-card {
        padding:
          28px 20px 24px;

        border-radius: 26px;
      }

      .logo-box {
        width: 112px;
        height: 112px;
      }

      .logo-box img {
        width: 84px;
        height: 84px;
      }

      h1 {
        font-size: 22px;
      }

      .subtitle {
        font-size: 13px;
      }

      .form-control {
        height: 52px;

        font-size: 16px;
      }

      .btn-login {
        height: 54px;

        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <div class="page-bg-shape shape-1"></div>
  <div class="page-bg-shape shape-2"></div>

  <main class="login-card text-center">

    <div class="logo-box">
      <img
        src="./LOGO KASHEF.png"
        alt="شعار كشافة الرسالة الإسلامية"
      >
    </div>

    <div class="portal-badge">
      <span></span>
      بوابة داخلية آمنة
    </div>

    <h1>
      جمعية كشافة الرسالة الإسلامية
    </h1>

    <p class="subtitle">
      إدارة فوج الإمام موسى الكاظم (ع) - المسك
    </p>

    <form
      id="loginForm"
      class="text-end"
      novalidate
    >

      <div class="mb-3">

        <label
          for="username"
          class="form-label"
        >
          اسم المستخدم
        </label>

        <div class="input-wrap">

          <input
            type="text"
            id="username"
            class="form-control text-end"
            placeholder="مثال: leader1 أو admin"
            autocomplete="username"
            autocapitalize="none"
            spellcheck="false"
            required
          >

          <span
            class="input-icon"
            aria-hidden="true"
          >
            👤
          </span>

        </div>
      </div>

      <div class="mb-4">

        <label
          for="password"
          class="form-label"
        >
          كلمة المرور
        </label>

        <div class="input-wrap">

          <input
            type="password"
            id="password"
            class="form-control text-end password-input"
            placeholder="أدخل كلمة المرور"
            autocomplete="current-password"
            required
          >

          <button
            type="button"
            id="togglePasswordButton"
            class="toggle-password"
            aria-label="إظهار كلمة المرور"
          >
            👁
          </button>

        </div>
      </div>

      <button
        type="submit"
        id="loginButton"
        class="btn btn-login"
      >
        <span id="loginButtonText">
          تسجيل الدخول
        </span>
      </button>

      <div
        id="loginMessage"
        class="login-message"
        role="alert"
      ></div>

    </form>

    <p class="security-note">
      الدخول مخصص للحسابات المصرّح لها فقط.
    </p>

    <p class="footer">
      © 2026 جمعية كشافة الرسالة الإسلامية
    </p>

  </main>

  <script
    src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"
  ></script>

  <script>
    const SUPABASE_URL =
      "https://hubdemnxzldlilyyjoyh.supabase.co";

    const SUPABASE_PUBLISHABLE_KEY =
      "sb_publishable_lOM6aOp6NU7nHozpTpsTSA_HfBb-Xqq";

    /*
      هذا النطاق يجب أن يطابق البريد الذي استخدمته
      عند إنشاء المستخدمين داخل Supabase.

      مثال:
      leader1@risalascout.local
    */
    const EMAIL_DOMAIN =
      "risalascout.local";

    const supabaseClient =
      window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_PUBLISHABLE_KEY,
        {
          auth: {
            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true
          }
        }
      );

    const loginForm =
      document.getElementById(
        "loginForm"
      );

    const usernameInput =
      document.getElementById(
        "username"
      );

    const passwordInput =
      document.getElementById(
        "password"
      );

    const loginButton =
      document.getElementById(
        "loginButton"
      );

    const loginButtonText =
      document.getElementById(
        "loginButtonText"
      );

    const loginMessage =
      document.getElementById(
        "loginMessage"
      );

    const togglePasswordButton =
      document.getElementById(
        "togglePasswordButton"
      );

    function showMessage(
      message,
      type = "error"
    ) {
      loginMessage.textContent =
        message;

      loginMessage.className =
        "login-message " + type;
    }

    function clearMessage() {
      loginMessage.textContent = "";

      loginMessage.className =
        "login-message";
    }

    function setLoading(
      isLoading
    ) {
      loginButton.disabled =
        isLoading;

      usernameInput.disabled =
        isLoading;

      passwordInput.disabled =
        isLoading;

      if (isLoading) {
        loginButtonText.textContent =
          "جاري تسجيل الدخول...";
      } else {
        loginButtonText.textContent =
          "تسجيل الدخول";
      }
    }

    function normalizeUsername(
      value
    ) {
      return value
        .trim()
        .toLowerCase()
        .replace(/\s+/g, "");
    }

    function usernameToEmail(
      username
    ) {
      /*
        يسمح أيضًا بإدخال البريد كاملًا.
      */

      if (username.includes("@")) {
        return username;
      }

      return (
        username +
        "@" +
        EMAIL_DOMAIN
      );
    }

    function getDestination(
      profile
    ) {
      if (profile.role === "admin") {
        return "./admin.html";
      }

      const allowedLeaders = [
        "leader1",
        "leader2",
        "leader3",
        "leader4",
        "leader5",
        "leader6",
        "leader7",
        "leader8",
        "leader9"
      ];

      if (
        profile.role === "leader" &&
        allowedLeaders.includes(
          profile.leader_username
        )
      ) {
        return (
          "./" +
          profile.leader_username +
          ".html"
        );
      }

      return null;
    }

    async function loadProfile(
      userId
    ) {
      const {
        data,
        error
      } =
        await supabaseClient
          .from("profiles")
          .select(
            "leader_username, role"
          )
          .eq(
            "id",
            userId
          )
          .single();

      if (error) {
        throw new Error(
          "تعذر تحميل ملف الحساب من جدول profiles."
        );
      }

      return data;
    }

    togglePasswordButton
      .addEventListener(
        "click",
        function () {
          const isHidden =
            passwordInput.type ===
            "password";

          passwordInput.type =
            isHidden
              ? "text"
              : "password";

          togglePasswordButton.textContent =
            isHidden
              ? "🙈"
              : "👁";

          togglePasswordButton
            .setAttribute(
              "aria-label",
              isHidden
                ? "إخفاء كلمة المرور"
                : "إظهار كلمة المرور"
            );

          passwordInput.focus();
        }
      );

    usernameInput
      .addEventListener(
        "input",
        clearMessage
      );

    passwordInput
      .addEventListener(
        "input",
        clearMessage
      );

    loginForm
      .addEventListener(
        "submit",
        async function (
          event
        ) {
          event.preventDefault();

          clearMessage();

          const username =
            normalizeUsername(
              usernameInput.value
            );

          const password =
            passwordInput.value;

          if (
            !username ||
            !password
          ) {
            showMessage(
              "يرجى إدخال اسم المستخدم وكلمة المرور."
            );

            return;
          }

          setLoading(true);

          try {
            const email =
              usernameToEmail(
                username
              );

            const {
              data: authData,
              error: authError
            } =
              await supabaseClient
                .auth
                .signInWithPassword({
                  email: email,
                  password: password
                });

            if (authError) {
              throw new Error(
                "اسم المستخدم أو كلمة المرور غير صحيحة."
              );
            }

            if (
              !authData ||
              !authData.user
            ) {
              throw new Error(
                "لم يتم إنشاء جلسة تسجيل دخول."
              );
            }

            const profile =
              await loadProfile(
                authData.user.id
              );

            const destination =
              getDestination(
                profile
              );

            if (!destination) {
              await supabaseClient
                .auth
                .signOut();

              throw new Error(
                "هذا الحساب غير مرتبط بصفحة صالحة."
              );
            }

            showMessage(
              "تم تسجيل الدخول بنجاح. جاري فتح الحساب...",
              "success"
            );

            window.location.replace(
              destination
            );
          } catch (error) {
            console.error(error);

            if (
              error instanceof Error
            ) {
              showMessage(
                error.message
              );
            } else {
              showMessage(
                "حدث خطأ غير متوقع أثناء تسجيل الدخول."
              );
            }

            passwordInput.value = "";

            passwordInput.focus();
          } finally {
            setLoading(false);
          }
        }
      );

    async function redirectExistingSession() {
      try {
        const {
          data: {
            session
          },
          error
        } =
          await supabaseClient
            .auth
            .getSession();

        if (
          error ||
          !session ||
          !session.user
        ) {
          return;
        }

        const profile =
          await loadProfile(
            session.user.id
          );

        const destination =
          getDestination(
            profile
          );

        if (destination) {
          window.location.replace(
            destination
          );
        }
      } catch (error) {
        console.error(
          "Existing session error:",
          error
        );
      }
    }

    redirectExistingSession();
  </script>
</body>
</html>
