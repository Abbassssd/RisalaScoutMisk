<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>جمعية كشافة الرسالة الإسلامية</title>

 <img src="LOGO KASHEF.png" alt="Logo">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />

  <style>
    @font-face {
      font-family: "Noor";
      src: url("./fonts/Noor Regular.ttf") format("truetype");
      font-display: swap;
    }

    :root {
      --primary: #480081;
      --primary-light: #7b1fd1;
      --bg: #E6E6F9;
      --text: #231033;
      --muted: #7b7390;
      --border: #ded6f2;
      --white: #ffffff;
      --danger: #c62828;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: "Noor", "Tajawal", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, rgba(123,31,209,.20), transparent 28%),
        radial-gradient(circle at 85% 80%, rgba(72,0,129,.22), transparent 32%),
        linear-gradient(135deg, #f8f6ff, var(--bg));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      overflow-x: hidden;
    }

    .page-bg-shape {
      position: fixed;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(72,0,129,.18), rgba(123,31,209,.08));
      filter: blur(6px);
      z-index: 0;
    }

    .shape-1 { top: -90px; right: -70px; }
    .shape-2 { bottom: -110px; left: -80px; }

    .login-card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 460px;
      background: rgba(255,255,255,.90);
      border: 1px solid rgba(255,255,255,.9);
      border-radius: 30px;
      padding: 34px 32px 28px;
      box-shadow: 0 28px 80px rgba(72,0,129,.20);
      backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .login-card::before {
      content: "";
      position: absolute;
      top: -85px;
      right: -85px;
      width: 190px;
      height: 190px;
      border-radius: 50%;
      background: rgba(72,0,129,.10);
      z-index: -1;
    }

    .logo-box {
      width: 130px;
      height: 130px;
      margin: 0 auto 18px;
      border-radius: 34px;
      background: linear-gradient(145deg, #fff, #f1eaff);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 18px 38px rgba(72,0,129,.18);
    }

    .logo-box img {
      width: 98px;
      height: 98px;
      object-fit: contain;
    }

    .portal-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(72,0,129,.09);
      color: var(--primary);
      border: 1px solid rgba(72,0,129,.13);
      border-radius: 999px;
      padding: 7px 15px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .portal-badge span {
      width: 8px;
      height: 8px;
      background: var(--primary);
      border-radius: 50%;
      box-shadow: 0 0 0 5px rgba(72,0,129,.10);
    }

    h1 {
      color: var(--primary);
      font-size: 25px;
      line-height: 1.55;
      font-weight: 900;
      margin-bottom: 6px;
      text-align: center;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      margin-bottom: 26px;
    }

    .form-label {
      color: var(--primary);
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .input-wrap { position: relative; }

    .form-control {
      height: 54px;
      border-radius: 17px;
      border: 1px solid var(--border);
      padding: 0 18px;
      padding-left: 48px;
      color: var(--text);
      font-size: 15px;
      background-color: rgba(255,255,255,.92);
      box-shadow: none;
      transition: .25s ease;
    }

    .form-control::placeholder { color: #9c95ad; }

    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 .25rem rgba(72,0,129,.12);
    }

    .input-icon,
    .toggle-password {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: var(--primary);
      opacity: .75;
    }

    .input-icon {
      left: 18px;
      pointer-events: none;
      font-size: 18px;
    }

    .toggle-password {
      left: 14px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
    }

    .password-input { padding-left: 52px; }

    .btn-login {
      height: 56px;
      border: none;
      border-radius: 17px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      font-size: 18px;
      font-weight: 900;
      box-shadow: 0 16px 32px rgba(72,0,129,.27);
      transition: .25s ease;
    }

    .btn-login:hover {
      color: var(--white);
      transform: translateY(-2px);
      box-shadow: 0 20px 42px rgba(72,0,129,.34);
    }

    .login-error {
      display: none;
      margin-top: 16px;
      padding: 14px;
      border-radius: 14px;
      background: #FFECEC;
      border: 1px solid #FFB6B6;
      color: var(--danger);
      text-align: center;
      font-weight: 800;
      font-size: 13px;
      animation: fadeIn .25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .security-note,
    .footer {
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    .security-note {
      margin-top: 22px;
      margin-bottom: 10px;
      line-height: 1.8;
    }

    .footer { margin: 0; }

    @media (max-width: 480px) {
      body { padding: 14px; }

      .login-card {
        padding: 28px 20px 24px;
        border-radius: 26px;
      }

      .logo-box {
        width: 112px;
        height: 112px;
      }

      .logo-box img {
        width: 84px;
        height: 84px;
      }

      h1 { font-size: 22px; }

      .subtitle { font-size: 13px; }

      .form-control {
        height: 52px;
        font-size: 14px;
      }

      .btn-login {
        height: 54px;
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <div class="page-bg-shape shape-1"></div>
  <div class="page-bg-shape shape-2"></div>

  <main class="login-card text-center">
    <div class="logo-box">
      <img src="./LOGO KASHEF.png" alt="شعار كشافة الرسالة الإسلامية">
    </div>

    <div class="portal-badge">
      <span></span>
      بوابة داخلية آمنة
    </div>

    <h1>جمعية كشافة الرسالة الإسلامية</h1>
    <p class="subtitle">إدارة فوج الإمام موسى  الكاظم (ع) - المسك</p>

    <form id="loginForm" class="text-end">
      <div class="mb-3">
        <label for="username" class="form-label">اسم المستخدم</label>
        <div class="input-wrap">
          <input
            type="text"
            id="username"
            class="form-control text-end"
            placeholder="أدخل اسم المستخدم"
            autocomplete="username"
            required
          >
          <span class="input-icon">👤</span>
        </div>
      </div>

      <div class="mb-4">
        <label for="password" class="form-label">كلمة المرور</label>
        <div class="input-wrap">
          <input
            type="password"
            id="password"
            class="form-control text-end password-input"
            placeholder="أدخل كلمة المرور"
            autocomplete="current-password"
            required
          >
          <button type="button" class="toggle-password" onclick="togglePassword()">👁</button>
        </div>
      </div>

      <button type="submit" class="btn btn-login w-100">
        تسجيل الدخول
      </button>

      <div id="errorMessage" class="login-error">
        اسم المستخدم أو كلمة المرور غير صحيحة.
      </div>
    </form>

    <p class="security-note">الدخول مخصص للقادة المصرّح لهم فقط.</p>
    <p class="footer">© 2026 جمعية كشافة الرسالة الإسلامية</p>
  </main>

  <script>
    const users = [
      { username: "admin", password: "admin123", page: "admin.html" },
      { username: "leader1", password: "leader123", page: "leader1.html" },
      { username: "leader2", password: "leader123", page: "leader2.html" },
      { username: "leader3", password: "leader123", page: "leader3.html" },
      { username: "leader4", password: "leader123", page: "leader4.html" },
      { username: "leader5", password: "leader123", page: "leader5.html" },
      { username: "leader6", password: "leader123", page: "leader6.html" },
      { username: "leader7", password: "leader123", page: "leader7.html" },
      { username: "leader8", password: "leader123", page: "leader8.html" },
        { username: "leader9", password: "leader123", page: "leader9.html" }
    ];

    function togglePassword() {
      const passwordInput = document.getElementById("password");
      passwordInput.type = passwordInput.type === "password" ? "text" : "password";
    }

    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const errorMessage = document.getElementById("errorMessage");

      errorMessage.style.display = "none";

      const user = users.find(u => u.username === username && u.password === password);

      if (user) {
        sessionStorage.setItem("isLoggedIn", "true");
        sessionStorage.setItem("loggedInUser", user.username);
        window.location.href = user.page;
      } else {
        errorMessage.innerText = "❌ اسم المستخدم أو كلمة المرور غير صحيحة.";
        errorMessage.style.display = "block";
        document.getElementById("password").value = "";
        document.getElementById("password").focus();
      }
    });
    
  </script>
  <script>
  if (
    sessionStorage.getItem("isLoggedIn") !== "true" ||
    sessionStorage.getItem("loggedInUser") !== "leader1"
  ) {
    window.location.href = "index.html";
  }
</script>
</body>
</html>
