<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة تحكم الأدمن</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="icon" type="image/png" href="LOGO KASHEF.png">

  <style>
    @font-face {
      font-family: "Noor";
      src: url("Noor Regular.ttf") format("truetype");
      font-display: swap;
    }

    :root {
      --primary:#480081;
      --primary2:#7b1fd1;
      --bg:#E6E6F9;
      --text:#241036;
      --muted:#766c89;
      --green:#198754;
    }

    body {
      margin:0;
      min-height:100vh;
      font-family:"Noor", Tahoma, Arial, sans-serif;
      background:linear-gradient(135deg,#faf8ff,var(--bg));
      color:var(--text);
      padding:24px;
    }

    .page {
      max-width:1250px;
      margin:auto;
    }

    .header {
      background:white;
      border-radius:28px;
      padding:28px;
      box-shadow:0 20px 55px rgba(72,0,129,.13);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
      margin-bottom:24px;
    }

    h1 {
      color:var(--primary);
      font-weight:900;
      margin:0;
    }

    .btn-export {
      background:var(--green);
      color:white;
      border:none;
      border-radius:16px;
      padding:13px 24px;
      font-weight:900;
    }

    .stats {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:18px;
      margin-bottom:24px;
    }

    .stat-card {
      background:white;
      border-radius:24px;
      padding:24px;
      box-shadow:0 16px 38px rgba(72,0,129,.11);
    }

    .stat-card h3 {
      color:var(--muted);
      font-size:15px;
      margin-bottom:10px;
    }

    .stat-card .number {
      color:var(--primary);
      font-size:38px;
      font-weight:900;
    }

    .table-card {
      background:white;
      border-radius:26px;
      padding:22px;
      box-shadow:0 16px 38px rgba(72,0,129,.11);
      overflow-x:auto;
    }

    table {
      min-width:1100px;
    }

    thead th {
      background:#f3eefb !important;
      color:var(--primary) !important;
      font-weight:900;
      white-space:nowrap;
    }

    tbody td {
      vertical-align:middle;
      white-space:nowrap;
    }

    .member-photo {
      width:48px;
      height:48px;
      border-radius:12px;
      object-fit:cover;
      background:#f1eef8;
    }

    .empty {
      background:white;
      border-radius:24px;
      padding:50px;
      text-align:center;
      color:var(--muted);
      box-shadow:0 16px 38px rgba(72,0,129,.11);
    }

    @media(max-width:700px){
      body{padding:14px;}
      .header{
        flex-direction:column;
        text-align:center;
      }
    }
  </style>
</head>

<body>
  <main class="page">

    <section class="header">
      <div>
        <h1>لوحة تحكم الأدمن</h1>
        <p class="text-muted mb-0">عرض جميع بيانات الأعضاء</p>
      </div>

      <button class="btn-export" onclick="exportAllToExcel()">
        تصدير كل البيانات Excel
      </button>
    </section>

    <section class="stats">
      <div class="stat-card">
        <h3>إجمالي عدد الكشفيين</h3>
        <div id="totalScouts" class="number">0</div>
      </div>

      <div class="stat-card">
        <h3>عدد الفرق / الصفحات</h3>
        <div id="totalTeams" class="number">0</div>
      </div>

      <div class="stat-card">
        <h3>آخر تحديث</h3>
        <div id="lastUpdate" class="number" style="font-size:20px;">-</div>
      </div>
    </section>

    <section id="emptyBox" class="empty">
      لا يوجد بيانات حالياً.
    </section>

    <section id="tableCard" class="table-card d-none">
      <table class="table table-hover align-middle">
        <thead>
          <tr>
            <th>الصورة</th>
            <th>الفرقة</th>
            <th>الاسم الكامل</th>
            <th>اسم الأم</th>
            <th>تاريخ الولادة</th>
            <th>محل الولادة</th>
            <th>رقم السجل</th>
            <th>فئة الدم</th>
            <th>الهاتف</th>
            <th>ولي الأمر</th>
            <th>البريد الإلكتروني</th>
            <th>عدد أفراد الأسرة</th>
            <th>العنوان</th>
            <th>ملاحظات صحية</th>
          </tr>
        </thead>
        <tbody id="adminTableBody"></tbody>
      </table>
    </section>

  </main>

  <script>
    const teamSources = [
      { key: "leader1Members", name: "باقة الزنبق - البراعم" },
      { key: "leader2Members", name: "القائد الثاني" },
      { key: "leader3Members", name: "القائد الثالث" },
      { key: "leader4Members", name: "القائد الرابع" },
      { key: "leader5Members", name: "القائد الخامس" },
      { key: "leader6Members", name: "القائد السادس" },
      { key: "leader7Members", name: "القائد السابع" },
      { key: "leader8Members", name: "القائد الثامن" }
    ];

    let allMembers = [];

    function loadAllMembers() {
      allMembers = [];

      teamSources.forEach(team => {
        const data = JSON.parse(localStorage.getItem(team.key)) || [];

        data.forEach(member => {
          allMembers.push({
            teamName: team.name,
            ...member
          });
        });
      });

      renderDashboard();
    }

    function renderDashboard() {
      const totalScouts = document.getElementById("totalScouts");
      const totalTeams = document.getElementById("totalTeams");
      const lastUpdate = document.getElementById("lastUpdate");
      const emptyBox = document.getElementById("emptyBox");
      const tableCard = document.getElementById("tableCard");
      const tbody = document.getElementById("adminTableBody");

      totalScouts.innerText = allMembers.length;

      const activeTeams = new Set(allMembers.map(m => m.teamName));
      totalTeams.innerText = activeTeams.size;

      lastUpdate.innerText = new Date().toLocaleDateString("ar-LB");

      tbody.innerHTML = "";

      if (allMembers.length === 0) {
        emptyBox.classList.remove("d-none");
        tableCard.classList.add("d-none");
        return;
      }

      emptyBox.classList.add("d-none");
      tableCard.classList.remove("d-none");

      allMembers.forEach(m => {
        const fullName = `${m.firstName || ""} ${m.fatherName || ""} ${m.familyName || ""}`;

        const row = document.createElement("tr");

        row.innerHTML = `
          <td><img src="${m.photo || 'LOGO KASHEF.png'}" class="member-photo"></td>
          <td>${m.teamName || "-"}</td>
          <td>${fullName}</td>
          <td>${m.motherName || "-"} ${m.motherFamilyName || ""}</td>
          <td>${m.birthDate || "-"}</td>
          <td>${m.birthPlace || "-"}</td>
          <td>${m.recordNumber || "-"}</td>
          <td>${m.bloodType || "-"}</td>
          <td>${m.phone || "-"}</td>
          <td>${m.parentPhone || "-"}</td>
          <td>${m.email || "-"}</td>
          <td>${m.familyMembers || "-"}</td>
          <td>${m.address || "-"}</td>
          <td>${m.healthNotes || "-"}</td>
        `;

        tbody.appendChild(row);
      });
    }

    function exportAllToExcel() {
      if (allMembers.length === 0) {
        alert("لا يوجد بيانات لتصديرها.");
        return;
      }

      let table = `
        <table border="1">
          <thead>
            <tr>
              <th>الفرقة</th>
              <th>الاسم</th>
              <th>اسم الأب</th>
              <th>الشهرة</th>
              <th>اسم الأم</th>
              <th>شهرة الأم</th>
              <th>تاريخ الولادة</th>
              <th>محل الولادة</th>
              <th>رقم السجل</th>
              <th>فئة الدم</th>
              <th>رقم الهاتف</th>
              <th>رقم ولي الأمر</th>
              <th>البريد الإلكتروني</th>
              <th>عدد أفراد الأسرة</th>
              <th>العنوان</th>
              <th>ملاحظات صحية</th>
            </tr>
          </thead>
          <tbody>
      `;

      allMembers.forEach(m => {
        table += `
          <tr>
            <td>${m.teamName || ""}</td>
            <td>${m.firstName || ""}</td>
            <td>${m.fatherName || ""}</td>
            <td>${m.familyName || ""}</td>
            <td>${m.motherName || ""}</td>
            <td>${m.motherFamilyName || ""}</td>
            <td>${m.birthDate || ""}</td>
            <td>${m.birthPlace || ""}</td>
            <td>${m.recordNumber || ""}</td>
            <td>${m.bloodType || ""}</td>
            <td>${m.phone || ""}</td>
            <td>${m.parentPhone || ""}</td>
            <td>${m.email || ""}</td>
            <td>${m.familyMembers || ""}</td>
            <td>${m.address || ""}</td>
            <td>${m.healthNotes || ""}</td>
          </tr>
        `;
      });

      table += `
          </tbody>
        </table>
      `;

      const blob = new Blob(["\ufeff" + table], {
        type: "application/vnd.ms-excel;charset=utf-8;"
      });

      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "كل_بيانات_الكشفيين.xls";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(link.href);
    }

    loadAllMembers();
  </script>
</body>
</html>
